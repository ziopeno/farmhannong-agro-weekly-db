<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Farmhannong Agro Weekly</title>
<meta name="theme-color" content="#f3efe4">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Agro Weekly">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --green:#15663f; --green-bright:#2f9e44; --ink:#1b271f; --paper:#fcfaf3; --ivory:#f3efe4; --hair:#e4ddcc; --mono:'IBM Plex Mono',ui-monospace,monospace; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh; min-height: 100dvh; display: flex; align-items: center; justify-content: center;
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Segoe UI', sans-serif;
    background-color: var(--ivory);
    background-image: radial-gradient(1000px 420px at 88% -14%, rgba(47,93,57,0.06), transparent 62%);
    color: var(--ink); padding: 24px;
  }
  .gate {
    width: 100%; max-width: 430px; background: var(--paper);
    border: 1px solid var(--hair); border-radius: 18px;
    box-shadow: 0 18px 48px rgba(27,39,31,0.10); padding: 46px 38px 38px; text-align: center;
    opacity: 0;
  }
  .sprout { width: 50px; height: 60px; display: block; margin: 0 auto 16px; }
  .sprout path { fill: none; stroke: var(--green); stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.55em; font-weight: 700; color: var(--green); letter-spacing: 0.01em; line-height: 1.15; }
  .kicker { font-family: var(--mono); font-size: 0.62em; letter-spacing: 0.22em; color: #7c8a80; margin-top: 9px; text-transform: uppercase; }
  .sub { font-size: 0.86em; color: #6f8077; line-height: 1.7; margin: 20px 0 24px; }
  .sub b { color: var(--ink); font-weight: 700; }
  .row { display: flex; gap: 8px; }
  .input-wrap { position: relative; flex: 1; display: flex; }
  input {
    flex: 1; width: 100%; padding: 13px 46px 13px 16px; border: 1.5px solid var(--hair); border-radius: 11px;
    font-family: var(--mono); font-size: 0.92em; letter-spacing: 0.06em; color: var(--ink);
    background: #fff; outline: none; box-sizing: border-box; transition: border-color .16s;
  }
  input::placeholder { color: #aeb8ad; letter-spacing: 0.04em; }
  input:focus { border-color: var(--green-bright); }
  .eye-btn {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    background: none; border: none; padding: 7px; margin: 0; cursor: pointer;
    color: #8aa094; display: flex; align-items: center; border-radius: 8px;
  }
  .eye-btn:hover { color: var(--green); background: #eef5f0; }
  .eye-btn svg { width: 20px; height: 20px; display: block; }
  #enterBtn {
    padding: 13px 22px; border: none; border-radius: 11px; cursor: pointer;
    background: var(--green); color: #fff; font-size: 0.92em; font-weight: 700; letter-spacing: 0.02em;
    transition: background .16s, transform .12s;
  }
  #enterBtn:hover { background: var(--green-bright); }
  #enterBtn:active { transform: scale(0.97); }
  #enterBtn:disabled { opacity: 0.55; cursor: default; }
  .msg { min-height: 1.3em; margin-top: 14px; font-size: 0.82em; color: #b03a2e; font-family: var(--mono); letter-spacing: 0.01em; }
  .msg.ok { color: var(--green); }
  .note { margin-top: 22px; font-size: 0.74em; color: #9aa392; line-height: 1.75; }
  .note .hr { width: 28px; height: 1px; background: var(--hair); margin: 0 auto 14px; }

  /* ---- intro motion (plays when body.ready) ---- */
  .ready .gate { animation: fadeIn .55s ease forwards; }
  .ready .sprout .stem  { animation: draw .7s .30s ease forwards; }
  .ready .sprout .leafL { animation: draw .6s .62s ease forwards; }
  .ready .sprout .leafR { animation: draw .6s .80s ease forwards; }
  .ready h1      { animation: rise .6s .38s ease both; }
  .ready .kicker { animation: rise .6s .46s ease both; }
  .ready .sub    { animation: rise .6s .52s ease both; }
  .ready .row    { animation: rise .6s .60s ease both; }
  .ready .note   { animation: rise .6s .72s ease both; }
  .sprout .stem, .sprout .leafL, .sprout .leafR { stroke-dasharray: 1; stroke-dashoffset: 1; }
  h1, .kicker, .sub, .row, .note { opacity: 0; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  @keyframes draw { to { stroke-dashoffset: 0; } }

  /* ---- exit motion (plays when body.leaving) ---- */
  .leaving .gate   { animation: gateOut .72s cubic-bezier(.4,0,.2,1) forwards; }
  .leaving .sprout { animation: grow .72s cubic-bezier(.4,0,.2,1) forwards; transform-origin: 24px 56px; }
  @keyframes gateOut { to { opacity: 0; transform: translateY(-10px) scale(0.985); } }
  @keyframes grow { 40% { opacity: 1; } to { opacity: 0; transform: translateY(-14px) scale(1.7); } }

  @media (prefers-reduced-motion: reduce) {
    .gate { opacity: 1; }
    h1, .kicker, .sub, .row, .note { opacity: 1; }
    .sprout .stem, .sprout .leafL, .sprout .leafR { stroke-dashoffset: 0; }
    .ready *, .leaving * { animation: none !important; }
  }
</style>
</head>
<body>
  <div class="gate">
    <svg class="sprout" viewBox="0 0 48 60" aria-hidden="true">
      <path class="stem"  pathLength="1" d="M24 56 L24 27"/>
      <path class="leafL" pathLength="1" d="M24 32 C 11 32 5 23 6 12 C 19 13 24 22 24 32"/>
      <path class="leafR" pathLength="1" d="M24 27 C 37 27 43 18 42 7 C 29 8 24 17 24 27"/>
    </svg>
    <h1>Farmhannong Agro Weekly</h1>
    <div class="kicker">Overseas Crop-Protection Intelligence</div>
    <p class="sub">사내 전용 페이지입니다.<br>관리자에게 부여받은 <b>개인 입장 코드</b>를 입력해주세요.</p>
    <div class="row">
      <div class="input-wrap">
        <input type="password" id="codeInput" placeholder="입장 코드" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" autofocus>
        <button type="button" class="eye-btn" id="eyeBtn" aria-label="코드 보기" title="코드 보기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
      </div>
      <button id="enterBtn">입장</button>
    </div>
    <div class="msg" id="msg"></div>
    <p class="note"><span class="hr"></span>코드가 확인되면 이 브라우저에서는 다시 묻지 않습니다.<br>코드가 없거나 잊으셨다면 관리자에게 문의해주세요.</p>
  </div>
<script>
(function () {
  'use strict';
  var KEY_STORE = 'fhn_site_key';
  var enc = new TextEncoder();
  var REDUCE = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var payloadPromise = fetch('payload.enc', { cache: 'no-store' }).then(function (r) {
    if (!r.ok) throw new Error('payload fetch ' + r.status);
    return r.json();
  });

  function b64ToBuf(b64) {
    var bin = atob(b64), buf = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
    return buf;
  }
  function bufToB64(buf) {
    var bytes = new Uint8Array(buf), bin = '';
    for (var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    return btoa(bin);
  }
  function deriveKey(code, saltBuf) {
    return crypto.subtle.importKey('raw', enc.encode(code.normalize('NFKC')), 'PBKDF2', false, ['deriveKey'])
      .then(function (base) {
        return crypto.subtle.deriveKey(
          { name: 'PBKDF2', hash: 'SHA-256', salt: saltBuf, iterations: 150000 },
          base, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
      });
  }
  function gcmDecrypt(key, ivB64, ctB64) {
    return crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64ToBuf(ivB64) }, key, b64ToBuf(ctB64));
  }
  function importContentKey(rawBuf, usages) {
    return crypto.subtle.importKey('raw', rawBuf, { name: 'AES-GCM' }, false, usages || ['decrypt']);
  }
  var FILTER_UI_STYLE = [
    '<style data-filter-ui-enhancement>',
    '.filters-panel-trigger{min-height:54px!important;padding:13px 16px!important;font-size:1.06rem!important;font-weight:800!important;color:#0f5f38!important;border:1.5px solid #c9d9cf!important;background:rgba(255,255,255,.96)!important;box-shadow:0 4px 14px rgba(21,102,63,.08)!important;}',
    '.filters-panel-trigger:hover{border-color:#7eaa91!important;background:#fff!important;}',
    '.filters-container{gap:12px!important;padding:14px!important;background:rgba(248,251,249,.96)!important;border:1px solid #d8e4dc!important;}',
    '.checklist-dropdown summary{min-height:58px!important;padding:15px 44px 15px 16px!important;border:1.5px solid #cbdad1!important;background:rgba(255,255,255,.98)!important;box-shadow:0 3px 10px rgba(31,65,45,.055)!important;transition:border-color .16s ease,box-shadow .16s ease,background .16s ease,transform .16s ease!important;}',
    '.checklist-dropdown summary:hover{border-color:#7ea78e!important;background:#fff!important;transform:translateY(-1px)!important;box-shadow:0 6px 16px rgba(31,65,45,.09)!important;}',
    '.checklist-dropdown .filter-label{font-size:1.04rem!important;font-weight:800!important;color:#18251d!important;gap:8px!important;}',
    '.checklist-dropdown .filter-summary{font-size:.95rem!important;font-weight:800!important;color:#147044!important;max-width:46%!important;}',
    '.checklist-dropdown summary::after{right:15px!important;font-size:1.35rem!important;font-weight:800!important;color:#547565!important;}',
    '.checklist-dropdown[open] summary{border-color:#218653!important;background:#f8fcf9!important;box-shadow:0 0 0 3px rgba(33,134,83,.13)!important;}',
    '.filter-options-panel{margin-top:7px!important;padding:11px!important;border:1px solid #d5e2da!important;border-radius:8px!important;background:rgba(255,255,255,.98)!important;box-shadow:0 7px 18px rgba(31,65,45,.08)!important;}',
    '.filter-option-search{min-height:44px!important;margin-bottom:9px!important;padding:10px 12px!important;font-size:.96rem!important;border-color:#cbdad1!important;}',
    '.filter-bulk-actions{display:flex;align-items:center;gap:7px;margin:0 0 9px;padding-bottom:9px;border-bottom:1px solid #e1e9e4;}',
    '.filter-bulk-btn{min-height:36px;padding:7px 11px;border:1px solid #9bbbab;border-radius:7px;background:#fff;color:#155f3a;font:inherit;font-size:.88rem;font-weight:800;cursor:pointer;transition:background .15s ease,border-color .15s ease,color .15s ease,transform .15s ease;}',
    '.filter-bulk-btn:hover{background:#eaf5ee;border-color:#438661;color:#0d4f2f;transform:translateY(-1px);}',
    '.filter-bulk-btn:focus-visible{outline:3px solid rgba(33,134,83,.2);outline-offset:2px;}',
    '.filter-bulk-count{margin-left:auto;color:#607568;font-size:.82rem;font-weight:700;white-space:nowrap;}',
    '.multi-filter{gap:4px!important;max-height:280px!important;padding:6px!important;background:#fff!important;border-color:#dbe6df!important;}',
    '.filter-chip{min-height:42px!important;gap:10px!important;padding:2px 4px!important;border-radius:7px!important;}',
    '.filter-chip:hover{background:#edf7f1!important;}',
    '.filter-chip input{width:20px!important;height:20px!important;}',
    '.filter-chip span{min-height:36px!important;padding:7px 8px!important;font-size:.98rem!important;font-weight:700!important;color:#243229!important;}',
    '@media(max-width:600px){.filters-container{padding:12px!important}.checklist-dropdown summary{min-height:60px!important;padding:15px 42px 15px 15px!important}.checklist-dropdown .filter-label{font-size:1.08rem!important}.checklist-dropdown .filter-summary{font-size:.96rem!important}.filter-bulk-actions{flex-wrap:wrap}.filter-bulk-count{width:100%;margin-left:0;text-align:right}.filter-chip span{font-size:1rem!important}}',
    '</style>'
  ].join('');

  function installFilterUiEnhancement() {
    var FILTER_IDS = ['yearFilter', 'dateFilter', 'categoryFilter', 'productTypeFilter', 'companyFilter', 'countryFilter'];
    var REGION_LABELS = {
      'eu': true,
      '유럽연합': true,
      '유럽': true,
      '글로벌': true,
      '세계': true,
      '전 세계': true,
      '아시아': true,
      '동남아': true,
      '동남아시아': true,
      '북미': true,
      '남미': true,
      '중남미': true,
      '중동': true,
      '아프리카': true,
      '오세아니아': true
    };

    function splitCountryLabels(value) {
      var text = String(value || '').replace(/\s+/g, ' ').trim();
      if (!text) return [];
      return text.split(/\s*(?:\/|\||,|·|&|\s+및\s+)\s*/)
        .map(function (part) { return part.trim(); })
        .filter(function (part, index, parts) {
          return part && parts.indexOf(part) === index;
        });
    }

    function normalizeCountryLabel(value) {
      var parts = splitCountryLabels(value);
      if (!parts.length) return '';
      if (parts.length === 1) return parts[0];
      var countries = parts.filter(function (part) {
        return !REGION_LABELS[part.toLowerCase()];
      });
      return countries[0] || parts[parts.length - 1];
    }

    function normalizeNewsCountries() {
      if (typeof newsDatabase === 'undefined' || !newsDatabase) return;
      Object.keys(newsDatabase).forEach(function (date) {
        var items = newsDatabase[date];
        if (!Array.isArray(items)) return;
        items.forEach(function (item) {
          if (!item || !item.country) return;
          var countries = splitCountryLabels(item.country);
          item._countryFilterValues = countries;
          item.country = normalizeCountryLabel(item.country);
          var countrySearchText = countries.join(' ');
          if (countrySearchText && String(item.search_keywords || '').indexOf(countrySearchText) === -1) {
            item.search_keywords = [item.search_keywords, countrySearchText].filter(Boolean).join(' ');
          }
        });
      });
    }

    function getInputs(container) {
      return Array.prototype.slice.call(container.querySelectorAll('input[type="checkbox"]'));
    }

    function updateBulkCount(container) {
      var toolbar = container.parentElement && container.parentElement.querySelector('.filter-bulk-actions');
      if (!toolbar) return;
      var inputs = getInputs(container);
      var checked = inputs.filter(function (input) { return input.checked; }).length;
      var count = toolbar.querySelector('.filter-bulk-count');
      var nextText = checked + ' / ' + inputs.length + ' 선택';
      if (count && count.textContent !== nextText) count.textContent = nextText;
    }

    function applyBulkSelection(container, checked) {
      var inputs = getInputs(container);
      inputs.forEach(function (input) {
        if (!input.disabled) input.checked = checked;
      });
      if (container.id === 'yearFilter' && typeof window.updateDateDropdown === 'function') {
        window.updateDateDropdown();
      }
      if (typeof window.applyFilters === 'function') window.applyFilters();
      updateBulkCount(container);
      if (container.id === 'yearFilter') {
        var dateContainer = document.getElementById('dateFilter');
        if (dateContainer) updateBulkCount(dateContainer);
      }
    }

    function makeButton(label, checked, container) {
      var button = document.createElement('button');
      button.type = 'button';
      button.className = 'filter-bulk-btn';
      button.textContent = label;
      button.setAttribute('aria-label', label + ': ' + container.id);
      button.addEventListener('click', function () {
        applyBulkSelection(container, checked);
      });
      return button;
    }

    function ensureToolbar(container) {
      if (!container || !container.parentElement) return;
      var panel = container.parentElement;
      var toolbar = panel.querySelector('.filter-bulk-actions');
      if (!toolbar) {
        toolbar = document.createElement('div');
        toolbar.className = 'filter-bulk-actions';
        toolbar.appendChild(makeButton('전체 선택', true, container));
        toolbar.appendChild(makeButton('전체 해제', false, container));
        var count = document.createElement('span');
        count.className = 'filter-bulk-count';
        count.setAttribute('aria-live', 'polite');
        toolbar.appendChild(count);
        panel.insertBefore(toolbar, container);
      }
      updateBulkCount(container);
    }

    function enhanceFilters() {
      FILTER_IDS.forEach(function (id) {
        ensureToolbar(document.getElementById(id));
      });
    }

    document.addEventListener('change', function (event) {
      var input = event.target;
      if (!input || input.type !== 'checkbox') return;
      var container = input.closest && input.closest('.multi-filter');
      if (container) updateBulkCount(container);
    });

    var observer = new MutationObserver(function (mutations) {
      var shouldRefresh = mutations.some(function (mutation) {
        return mutation.type === 'childList';
      });
      if (shouldRefresh) enhanceFilters();
    });
    window.getCountryFilterValues = function (item) {
      if (!item) return [];
      if (Array.isArray(item._countryFilterValues) && item._countryFilterValues.length) {
        return item._countryFilterValues;
      }
      return item.country ? [item.country] : [];
    };
    normalizeNewsCountries();
    observer.observe(document.body, { childList: true, subtree: true });
    enhanceFilters();
    window.setTimeout(enhanceFilters, 100);
    window.setTimeout(enhanceFilters, 500);
  }

  function enhanceAppHtml(html) {
    if (!html || html.indexOf('data-filter-ui-enhancement') !== -1) return html;
    html = html.replace(
      /if\s*\(\s*item\.country\s*\)\s*countriesSet\.add\(\s*item\.country\s*\)\s*;/g,
      'getCountryFilterValues(item).forEach(country => countriesSet.add(country));'
    );
    html = html.replace(
      /selectedCountries\.includes\(\s*item\.country\s*\)/g,
      'getCountryFilterValues(item).some(country => selectedCountries.includes(country))'
    );
    var script = '<scr' + 'ipt data-filter-ui-enhancement>(' + installFilterUiEnhancement.toString() + ')();</scr' + 'ipt>';
    if (/<\/head>/i.test(html)) {
      html = html.replace(/<\/head>/i, FILTER_UI_STYLE + '</head>');
    } else {
      html = FILTER_UI_STYLE + html;
    }
    if (/<\/body>/i.test(html)) {
      return html.replace(/<\/body>/i, script + '</body>');
    }
    return html + script;
  }

  function show(html) {
    document.open();
    document.write(enhanceAppHtml(html));
    document.close();
  }
  // 입장 모션(새싹이 자라며 전환) 후 사이트 표시. 배경이 앱과 동일한 아이보리라 전환이 이어진다.
  function playExitThenShow(html) {
    if (REDUCE) { show(html); return; }
    document.body.classList.add('leaving');
    setTimeout(function () { show(html); }, 720);
  }
  function decryptContentWithRaw(payload, rawKeyBuf) {
    return importContentKey(rawKeyBuf).then(function (ck) {
      return gcmDecrypt(ck, payload.content.iv, payload.content.ct);
    }).then(function (buf) {
      return new TextDecoder().decode(buf);
    });
  }

  var input = document.getElementById('codeInput');
  var btn = document.getElementById('enterBtn');
  var msg = document.getElementById('msg');
  function setMsg(text, ok) { msg.textContent = text; msg.className = ok ? 'msg ok' : 'msg'; }
  function revealGate() {
    document.body.classList.add('ready');
    // 지난번 입장 코드를 미리 채워둔다(이 브라우저에 한해). 클릭 한 번이면 입장.
    try { var last = localStorage.getItem('fhn_last_code'); if (last) input.value = last; } catch (e) {}
    try { input.focus(); var n = input.value.length; if (n) input.setSelectionRange(n, n); } catch (e) {}
  }

  // 1) 저장된 키로 자동 입장 시도 — 성공 시 게이트를 보이지 않고 바로 사이트로,
  //    실패(코드 회수/교체) 시 게이트를 등장시켜 코드 재입력.
  var saved = null;
  try { saved = localStorage.getItem(KEY_STORE); } catch (e) {}
  if (saved) {
    payloadPromise.then(function (payload) {
      return decryptContentWithRaw(payload, b64ToBuf(saved)).then(show);
    }).catch(function () {
      try { localStorage.removeItem(KEY_STORE); } catch (e) {}
      revealGate();
    });
  } else {
    revealGate();
  }

  function tryUnwrap(payload, codeKey, idx) {
    if (idx >= payload.wraps.length) return Promise.reject(new Error('no-match'));
    var w = payload.wraps[idx];
    return gcmDecrypt(codeKey, w.iv, w.ct).catch(function () {
      return tryUnwrap(payload, codeKey, idx + 1);
    });
  }

  function enter() {
    var code = (input.value || '').trim();
    if (!code) { setMsg('입장 코드를 입력해주세요.'); return; }
    btn.disabled = true;
    setMsg('확인 중…', true);
    payloadPromise.then(function (payload) {
      return deriveKey(code, b64ToBuf(payload.salt)).then(function (codeKey) {
        return tryUnwrap(payload, codeKey, 0);
      }).then(function (rawKeyBuf) {
        try { localStorage.setItem(KEY_STORE, bufToB64(rawKeyBuf)); localStorage.setItem('fhn_last_code', code); } catch (e) {}
        setMsg('확인되었습니다. 여는 중…', true);
        return decryptContentWithRaw(payload, rawKeyBuf).then(playExitThenShow);
      });
    }).catch(function (e) {
      btn.disabled = false;
      if (e && /payload fetch/.test(String(e.message))) {
        setMsg('데이터를 불러오지 못했습니다. 네트워크 확인 후 새로고침해주세요.');
      } else {
        setMsg('코드가 올바르지 않습니다. 관리자에게 문의해주세요.');
        input.select();
      }
    });
  }
  btn.addEventListener('click', enter);
  input.addEventListener('keydown', function (e) { if (e.key === 'Enter') enter(); });

  // 코드 보기/숨기기 토글 (눈 아이콘)
  var eyeBtn = document.getElementById('eyeBtn');
  var EYE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>';
  var EYE_OFF = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.5 10.5 0 0 1 12 19c-7 0-11-7-11-7a18.5 18.5 0 0 1 5.06-5.94M9.9 4.24A9.5 9.5 0 0 1 12 5c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19M14.12 14.12A3 3 0 1 1 9.88 9.88"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
  if (eyeBtn) {
    eyeBtn.addEventListener('click', function () {
      var showing = input.type === 'password';
      input.type = showing ? 'text' : 'password';
      eyeBtn.innerHTML = showing ? EYE_OFF : EYE;
      var label = showing ? '코드 숨기기' : '코드 보기';
      eyeBtn.setAttribute('aria-label', label);
      eyeBtn.setAttribute('title', label);
      input.focus();
    });
  }
})();
</script>
</body>
</html>
