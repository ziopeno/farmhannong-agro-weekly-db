name: Weekly Agro News Update

on:
  schedule:
    # 00:00 UTC every Monday = 09:00 Monday in Korea Standard Time.
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      target_date:
        description: "Monday date key to update, for example 2026-06-01. Leave blank for current KST Monday."
        required: false
        type: string
      replace_existing:
        description: "Regenerate the selected week even if it already exists."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: weekly-agro-news-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      TARGET_DATE: ${{ inputs.target_date }}
      REPLACE_EXISTING: ${{ inputs.replace_existing }}
      SUMMARY_EMAIL_RECIPIENTS: ${{ vars.SUMMARY_EMAIL_RECIPIENTS }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      SITE_URL: ${{ vars.SITE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install PDF dependency
        run: python -m pip install --upgrade reportlab

      - name: Generate weekly card data
        shell: bash
        run: |
          set -euo pipefail
          args=()
          if [[ -n "${TARGET_DATE:-}" ]]; then
            args+=(--target-date "$TARGET_DATE")
          fi
          if [[ "${REPLACE_EXISTING:-false}" == "true" ]]; then
            args+=(--replace-existing)
          fi
          python scripts/update_weekly_cards.py "${args[@]}"

      - name: Generate source evidence PDFs
        shell: bash
        run: |
          set -euo pipefail
          args=()
          if [[ -n "${TARGET_DATE:-}" ]]; then
            args+=(--date "$TARGET_DATE")
          fi
          if [[ "${REPLACE_EXISTING:-false}" == "true" ]]; then
            args+=(--force)
          fi
          python scripts/generate_source_pdfs.py "${args[@]}"

      - name: Verify dashboard
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${TARGET_DATE:-}" ]]; then
            node scripts/verify_weekly_deploy.js
          else
            node scripts/verify_weekly_deploy.js --expect-current-week
          fi

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- index.html source-pdfs; then
            echo "No dashboard changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html source-pdfs
          week="$(python -c 'import pathlib, re; text = pathlib.Path("index.html").read_text(encoding="utf-8"); print(re.search(r"최근 업데이트: ([^<]+)", text).group(1))')"
          git commit -m "Add weekly cards for ${week}"
          git push origin main

      - name: Send weekly summary email
        run: python scripts/send_weekly_summary_email.py
